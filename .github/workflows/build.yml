name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: ./gradlew assembleRelease
      - run: mv app/build/outputs/apk/release/app-release.apk sort-battle.apk
      - uses: actions/upload-artifact@v4
        with:
          name: sort-battle
          path: sort-battle.apk
          retention-days: 30
